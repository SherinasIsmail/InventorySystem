{% extends "base.html" %}
{% block content %}
<div class="p-8 bg-gray-50 min-h-screen">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-3xl font-bold text-gray-900">System Audit Log</h2>
                <p class="text-gray-500">Live tracking of all staff and supplier actions</p>
            </div>
            <a href="/admin" class="bg-white border border-gray-200 px-4 py-2 rounded-xl text-sm font-semibold hover:bg-gray-50 transition-all">
                <i class="fas fa-chevron-left mr-2"></i>Back to Dashboard
            </a>
        </div>

        <div class="flex flex-col md:flex-row gap-4 mb-6">
            <div class="relative flex-1">
                <input type="text" id="logSearch" onkeyup="filterLogs()" 
                       placeholder="Search by Staff Name (e.g., Rahul), Action, or Product..." 
                       class="w-full p-4 rounded-2xl border-none shadow-sm focus:ring-2 focus:ring-blue-500">
            </div>
            <button onclick="exportFilteredActivities()" class="bg-green-600 text-white px-6 py-4 rounded-2xl font-bold hover:bg-green-700 transition-all flex items-center gap-2 cursor-pointer">
    <i class="fas fa-file-download"></i> Export CSV
</button>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
    <div class="overflow-y-auto" style="max-height: 70vh;"> 
        <table class="w-full text-left" id="logTable">
            <thead class="bg-gray-50 sticky top-0 z-10 shadow-sm">
                <tr>
                    <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">Timestamp</th>
                    <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">User</th>
                    <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">Action</th>
                    <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">Details</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
                {% for log in logs %}
                <tr class="hover:bg-blue-50/30 transition-colors">
                    <td class="px-6 py-4 text-sm text-gray-500">{{ log.timestamp }}</td>
                    <td class="px-6 py-4"><span class="font-semibold text-gray-700">{{ log.user }}</span></td>
                    <td class="px-6 py-4">
                        <span class="px-3 py-1 rounded-lg text-xs font-bold
                            {% if log.action == 'SALE' %}bg-green-100 text-green-700
                            {% elif 'SUPPLY' in log.action %}bg-purple-100 text-purple-700
                            {% else %}bg-gray-100 text-gray-700{% endif %}">
                            {{ log.action }}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-sm text-gray-600">{{ log.details }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
</div>

<script>
function filterLogs() {
    let input = document.getElementById("logSearch").value.toUpperCase();
    let rows = document.getElementById("logTable").getElementsByTagName("tr");
    for (let i = 1; i < rows.length; i++) {
        let text = rows[i].textContent || rows[i].innerText;
        rows[i].style.display = text.toUpperCase().indexOf(input) > -1 ? "" : "none";
    }
}
function exportFilteredActivities() {
    // Grab the exact text the user typed into the search box
    const searchWord = document.getElementById("logSearch").value;
    
    // Redirect to the Python route, carrying the search word in the URL
    window.location.href = `/export_activities?search=${encodeURIComponent(searchWord)}`;
}
</script>
{% endblock %}
